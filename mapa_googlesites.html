<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mapa Operativo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Encode+Sans+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; width:100%; overflow:hidden; }
body { font-family:'Encode Sans Condensed',sans-serif; background:#F4F5F7; display:flex; flex-direction:column; }
header { background:#FFFFFF; border-bottom:2px solid #DDE1E7; padding:7px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:10px; min-height:44px; }
.h-titulo { font-size:14px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#1A1D23; }
.h-alcaldia { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#7A8090; text-transform:uppercase; letter-spacing:.06em; margin-top:1px; }
.leyenda { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.pill { display:flex; align-items:center; gap:4px; padding:3px 9px 3px 7px; border-radius:20px; font-size:10px; font-weight:600; letter-spacing:.04em; border:1.5px solid transparent; cursor:pointer; transition:opacity .15s; user-select:none; }
.pill.off { opacity:.28; }
.pill-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.body { display:flex; flex:1; overflow:hidden; min-height:0; }
#map { flex:1; height:100%; }
.sidebar { width:200px; flex-shrink:0; background:#FFFFFF; border-left:1px solid #DDE1E7; display:flex; flex-direction:column; overflow:hidden; }
.sb-bloque { padding:10px 12px; border-bottom:1px solid #DDE1E7; }
.sb-label { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#7A8090; margin-bottom:7px; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.stat-box { background:#F4F5F7; border-radius:5px; padding:8px 6px; text-align:center; }
.stat-num { font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:500; line-height:1; }
.stat-lbl { font-size:8px; color:#7A8090; margin-top:2px; letter-spacing:.05em; text-transform:uppercase; }
.bar-row { margin-bottom:7px; }
.bar-meta { display:flex; justify-content:space-between; font-size:10px; margin-bottom:2px; }
.bar-pct { font-family:'IBM Plex Mono',monospace; font-size:9px; color:#7A8090; }
.bar-track { height:6px; background:#DDE1E7; border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }
.sec-list { flex:1; overflow-y:auto; padding:6px 12px; display:flex; flex-direction:column; gap:2px; min-height:0; }
.sec-item { display:flex; align-items:center; gap:6px; padding:4px 5px; border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:9px; background:#F4F5F7; cursor:pointer; transition:background .1s; }
.sec-item:hover { background:#DDE1E7; }
.sec-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sec-num { font-weight:500; color:#1A1D23; }
.sec-col { color:#7A8090; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ts { padding:8px 12px; font-family:'IBM Plex Mono',monospace; font-size:8px; color:#7A8090; border-top:1px solid #DDE1E7; flex-shrink:0; }
.leaflet-tooltip { background:#1A1D23 !important; border:none !important; border-radius:6px !important; color:#F4F5F7 !important; font-family:'IBM Plex Mono',monospace !important; font-size:10px !important; padding:8px 11px !important; box-shadow:0 4px 16px rgba(0,0,0,.3) !important; white-space:nowrap; pointer-events:none; }
.leaflet-tooltip::before { display:none !important; }
.tt-sec { font-size:12px; font-weight:500; margin-bottom:5px; }
.tt-row { display:flex; gap:7px; align-items:flex-start; margin-top:2px; }
.tt-key { color:#7A8090; font-size:8px; letter-spacing:.08em; text-transform:uppercase; width:52px; flex-shrink:0; padding-top:1px; }
.tt-val { color:#E8EAF0; font-size:10px; }
.tt-badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:8px; font-weight:600; }
#loader { position:fixed; inset:0; background:#F4F5F7; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
.ld-title { font-size:15px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
.ld-msg { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#7A8090; }
.spinner { width:28px; height:28px; border:3px solid #DDE1E7; border-top-color:#2980B9; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="loader">
  <div class="spinner"></div>
  <div class="ld-title">Mapa Operativo</div>
  <div class="ld-msg" id="ld-msg">Iniciando…</div>
</div>
<header>
  <div>
    <div class="h-titulo">Operativo Electoral CDMX</div>
    <div class="h-alcaldia" id="h-alc">Cargando…</div>
  </div>
  <div class="leyenda" id="leyenda"></div>
</header>
<div class="body">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-bloque">
      <div class="sb-label">Totales</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
    <div class="sb-bloque">
      <div class="sb-label">Avance</div>
      <div id="bars"></div>
    </div>
    <div class="sb-bloque" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0;">
      <div class="sb-label">Secciones</div>
      <div class="sec-list" id="sec-list"></div>
    </div>
    <div class="ts" id="ts">—</div>
  </div>
</div>
<script>
const CFG = {
  CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTwbPwygP3x2zRkg9v3uocAt4RRMOFGIV2e7a6kdDzhmS70zvu_83XjmyEOYTJpMtmF7RuhlKy8w4Er/pub?gid=1816585045&single=true&output=csv",
  GEOJSON_BASE: "https://cesarnieto13.github.io/mapa-operativo/mapa_operativo_geojson/",
  GEOJSON_GLOBAL: "https://cesarnieto13.github.io/mapa-operativo/mapa_operativo_geojson/secciones_operativo.geojson",
  CENTER: [19.36, -99.18],
  ZOOM: 11,
  REFRESH_MIN: 5,
  COLORES: {
    "COMPLETA":  "#E74C3C",
    "PENDIENTE": "#F1C40F",
  },
};

const params   = new URLSearchParams(window.location.search);
const ALCALDIA = (params.get("alcaldia") || "").trim().toUpperCase();

let map, geoLayer, operativo = {}, geoData = null;
let filtros = new Set(Object.keys(CFG.COLORES));

function initMap() {
  map = L.map("map", { center: CFG.CENTER, zoom: CFG.ZOOM });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
    { attribution:"©OpenStreetMap ©CARTO", maxZoom:19, subdomains:"abcd" }).addTo(map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",
    { attribution:"", maxZoom:19, subdomains:"abcd", pane:"overlayPane" }).addTo(map);
}

function cargarCSV() {
  return new Promise((res, rej) => {
    ld("Leyendo Google Sheet…");
    Papa.parse(CFG.CSV_URL, {
      download:true, header:true, skipEmptyLines:true,
      complete(r) {
        operativo = {};
        r.data.forEach(row => {
          const sec = String(row["SECCION"]||"").replace(".0","").trim().replace(/^0+/,"") || "0";
          const est = String(row["ESTATUS"]||"").trim().toUpperCase();
          const alc = String(row["ALCALDIA"]||row["MUNICIPIO"]||"").trim().toUpperCase();
          const col = String(row["COLONIA"]||"").trim();
          if (sec) operativo[sec] = { ESTATUS:est, ALCALDIA:alc, COLONIA:col };
        });
        res();
      }, error: rej,
    });
  });
}

async function cargarGeoJSON() {
  ld("Cargando geometrías…");
  const urls = [];
  if (ALCALDIA) {
    const archivo = "secciones_" + ALCALDIA.replace(/[^A-Z0-9]/g,"_") + ".geojson";
    urls.push(CFG.GEOJSON_BASE + archivo);
  }
  urls.push(CFG.GEOJSON_GLOBAL);
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      geoData = await r.json();
      return;
    } catch(e) { console.warn("No cargó:", url); }
  }
  geoData = null;
}

function getSeccion(props) {
  for (const k of ["SECCION_N","SECCION","SECC","CVE_SECC","seccion"]) {
    if (props[k] !== undefined)
      return String(props[k]).replace(".0","").trim().replace(/^0+/,"") || "0";
  }
  return "";
}

function dibujar() {
  if (geoLayer) { map.removeLayer(geoLayer); geoLayer = null; }
  if (!geoData) return;
  const features = geoData.features.filter(f => {
    const sec  = getSeccion(f.properties||{});
    const dato = operativo[sec];
    if (!dato) return false;
    if (ALCALDIA && dato.ALCALDIA !== ALCALDIA) return false;
    return filtros.has(dato.ESTATUS);
  });
  geoLayer = L.geoJSON({ type:"FeatureCollection", features }, {
    style(f) {
      const sec   = getSeccion(f.properties||{});
      const dato  = operativo[sec] || {};
      const color = CFG.COLORES[dato.ESTATUS] || "#999";
      return { fillColor:color, fillOpacity:0.85, color:"#FFFFFF", weight:0.6, opacity:1 };
    },
    onEachFeature(f, layer) {
      const sec   = getSeccion(f.properties||{});
      const dato  = operativo[sec] || {};
      const color = CFG.COLORES[dato.ESTATUS] || "#999";
      const est   = dato.ESTATUS  || "—";
      const alc   = dato.ALCALDIA || (f.properties||{})["ALCALDIA_N"] || "—";
      const col   = dato.COLONIA  || (f.properties||{})["NOMBRE"]     || "—";
      layer.bindTooltip(`
        <div class="tt-sec">Sección ${sec}</div>
        <div class="tt-row"><span class="tt-key">Colonia</span><span class="tt-val">${col}</span></div>
        <div class="tt-row"><span class="tt-key">Alcaldía</span><span class="tt-val">${alc}</span></div>
        <div class="tt-row"><span class="tt-key">Estatus</span>
          <span class="tt-badge" style="background:${color}22;color:${color};border:1px solid ${color}">${est}</span>
        </div>`, { sticky:true, opacity:1 });
      layer.on("mouseover", () => layer.setStyle({ fillOpacity:1, weight:1.5 }));
      layer.on("mouseout",  () => geoLayer && geoLayer.resetStyle(layer));
    }
  }).addTo(map);
  if (features.length > 0) {
    try { map.fitBounds(geoLayer.getBounds(), { padding:[25,25] }); } catch(e){}
  }
}

function actualizarSidebar() {
  const datos = Object.entries(operativo).filter(([,d]) => !ALCALDIA || d.ALCALDIA === ALCALDIA);
  const total = datos.length;
  const totales = {};
  datos.forEach(([,d]) => { totales[d.ESTATUS] = (totales[d.ESTATUS]||0)+1; });
  document.getElementById("h-alc").textContent = ALCALDIA ? ALCALDIA.replace(/\+/g," ") : "Todas las alcaldías";
  const sg = document.getElementById("stats-grid");
  sg.innerHTML = `<div class="stat-box"><div class="stat-num" style="color:#1A1D23">${total}</div><div class="stat-lbl">Secciones</div></div>`;
  Object.entries(CFG.COLORES).forEach(([est, color]) => {
    sg.insertAdjacentHTML("beforeend", `<div class="stat-box"><div class="stat-num" style="color:${color}">${totales[est]||0}</div><div class="stat-lbl">${est}</div></div>`);
  });
  const bars = document.getElementById("bars");
  bars.innerHTML = "";
  Object.entries(CFG.COLORES).forEach(([est, color]) => {
    const n = totales[est]||0, pct = total>0 ? Math.round(n/total*100) : 0;
    bars.insertAdjacentHTML("beforeend", `<div class="bar-row"><div class="bar-meta"><span style="color:${color};font-weight:600;font-size:10px">${est}</span><span class="bar-pct">${n} · ${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`);
  });
  const list = document.getElementById("sec-list");
  list.innerHTML = "";
  datos.filter(([,d]) => filtros.has(d.ESTATUS)).sort(([a],[b]) => Number(a)-Number(b)).forEach(([sec,d]) => {
    const color = CFG.COLORES[d.ESTATUS]||"#999";
    const item = document.createElement("div");
    item.className = "sec-item";
    item.innerHTML = `<div class="sec-dot" style="background:${color}"></div><span class="sec-num">${sec}</span><span class="sec-col">${d.COLONIA||d.ALCALDIA||""}</span>`;
    item.addEventListener("click", () => {
      if (!geoLayer) return;
      geoLayer.eachLayer(layer => {
        if (getSeccion(layer.feature?.properties||{}) === sec) {
          try { map.fitBounds(layer.getBounds(),{maxZoom:15,padding:[40,40]}); layer.openTooltip(); } catch(e){}
        }
      });
    });
    list.appendChild(item);
  });
  const now = new Date();
  document.getElementById("ts").textContent = `Act. ${now.toLocaleDateString("es-MX")} ${now.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})}`;
}

function initLeyenda() {
  const el = document.getElementById("leyenda");
  Object.entries(CFG.COLORES).forEach(([est, color]) => {
    const pill = document.createElement("div");
    pill.className = "pill";
    pill.style.cssText = `background:${color}18;color:${color};border-color:${color}`;
    pill.innerHTML = `<div class="pill-dot" style="background:${color}"></div>${est}`;
    pill.addEventListener("click", () => {
      if (filtros.has(est)) { filtros.delete(est); pill.classList.add("off"); }
      else { filtros.add(est); pill.classList.remove("off"); }
      dibujar(); actualizarSidebar();
    });
    el.appendChild(pill);
  });
}

function ld(msg) { document.getElementById("ld-msg").textContent = msg; }
function ocultarLoader() {
  const el = document.getElementById("loader");
  el.style.transition = "opacity .4s"; el.style.opacity = "0";
  setTimeout(() => el.style.display = "none", 400);
}

async function main() {
  initMap(); initLeyenda();
  try {
    await cargarCSV();
    await cargarGeoJSON();
    dibujar(); actualizarSidebar(); ocultarLoader();
  } catch(e) { console.error(e); ld("⚠️ Error. Abre la consola (F12) para ver detalles."); }
  if (CFG.REFRESH_MIN > 0) {
    setInterval(async () => { await cargarCSV(); dibujar(); actualizarSidebar(); }, CFG.REFRESH_MIN * 60_000);
  }
}
main();
</script>
</body>
</html>
